spring:
  datasource:
    url: jdbc:mysql://localhost:13306/crm?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: crm
    password: crm

  data:
    mongodb:
      uri: mongodb://localhost:27018/crm

  redis:
    host: localhost
    port: 6380

  elasticsearch:
    uris: http://localhost:9201

  kafka:
    bootstrap-servers: localhost:29092

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

elasticsearch:
  index:
    # true: 앱 시작 시 인덱스 자동 재생성 (사전 파일 수정 후 앱 재시작만으로 반영)
    # 운영 환경(prod)에서는 반드시 false 유지
    force-recreate: true

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.jdbc: DEBUG
    com.zaxxer.hikari: DEBUG
    org.springframework.security: DEBUG
    com.uplus.crm.common.filter: DEBUG

# Google OAuth - 환경변수 없으면 fallback 값으로 실행 (실제 OAuth 테스트 시엔 환경변수 필요)
google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:local-dev-google-client-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:local-dev-google-client-secret}

# JWT - 환경변수 없으면 fallback 값으로 실행
jwt:
  secret: ${JWT_SECRET:ureca4-crm-local-dev-jwt-secret-key-32chars!!}