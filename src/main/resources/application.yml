spring:
  application:
    name: crm

  # 기본 활성 프로파일: local
  # 배포 시 환경변수로 오버라이드: SPRING_PROFILES_ACTIVE=prod
  profiles:
    active: local

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true
    # 로컬에서 의도적으로 삭제된 마이그레이션 파일을 무시 (예: V25)
    ignore-migration-patterns: "*:missing"

  jpa:
    hibernate:
      ddl-auto: validate

  kafka:
    consumer:
      group-id: crm-group
      auto-offset-reset: earliest
    producer:
      acks: all

  task:
    scheduling:
      pool:
        size: 3

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  access-token-expire-ms: 3600000
  refresh-token-expire-ms: 604800000